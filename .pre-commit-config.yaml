# Pre-commit hooks for the Ditto monorepo.
# Install once:  uvx pre-commit install
# Run manually:  uvx pre-commit run --all-files
#
# Uses the backend project's own ruff (via uv) so the hook version always
# matches pyproject.toml — no separate pinned ruff to drift out of sync.
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (backend)
        entry: uv run --project backend ruff check --fix
        language: system
        files: ^backend/.*\.py$
        pass_filenames: true
      - id: ruff-format
        name: ruff format (backend)
        entry: uv run --project backend ruff format
        language: system
        files: ^backend/.*\.py$
        pass_filenames: true
