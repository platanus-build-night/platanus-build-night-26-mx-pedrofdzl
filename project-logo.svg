<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" rx="200" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="1000" height="500" rx="200" fill="url(#shine)"/>

  <!-- Ditto mark: two bold pill-shaped dots -->
  <!-- Left column -->
  <rect x="268" y="310" width="108" height="260" rx="54" fill="white" opacity="0.95"/>
  <rect x="268" y="608" width="108" height="80" rx="40" fill="white" opacity="0.95"/>

  <!-- Right column (offset down — the "ditto" echo) -->
  <rect x="428" y="352" width="108" height="260" rx="54" fill="white" opacity="0.70"/>
  <rect x="428" y="650" width="108" height="80" rx="40" fill="white" opacity="0.70"/>

  <!-- Checkmark accent (compliance signal) -->
  <polyline
    points="580,480 636,548 760,370"
    fill="none"
    stroke="white"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.90"
  />
</svg>
