services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ditto
      POSTGRES_USER: ditto
      POSTGRES_PASSWORD: ditto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ditto -d ditto"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
